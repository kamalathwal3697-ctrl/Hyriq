<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hyriq - Find your next vibe, land your dream career. Connecting top Gen-Z talent with premium employers." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.hyriq.online/" />
    <meta property="og:title" content="Hyriq | Find Your Vibe, Land Your Career" />
    <meta property="og:description" content="Find your next vibe, land your dream career. Connecting top Gen-Z talent with premium employers." />
    <meta property="og:image" content="https://www.hyriq.online/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.hyriq.online/" />
    <meta property="twitter:title" content="Hyriq | Find Your Vibe, Land Your Career" />
    <meta property="twitter:description" content="Find your next vibe, land your dream career. Connecting top Gen-Z talent with premium employers." />
    <meta property="twitter:image" content="https://www.hyriq.online/logo.png" />

    <title>Hyriq | Find Your Vibe, Land Your Career</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root">
      <!-- Premium CSS Loading state before React loads -->
      <style>
        .initial-loader-wrapper {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background: #0f172a;
          color: #ffffff;
          font-family: 'Outfit', sans-serif;
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          position: fixed;
          top: 0;
          left: 0;
          z-index: 9999;
        }
        .initial-loader-logo {
          font-size: 42px;
          font-weight: 800;
          background: linear-gradient(135deg, #3b82f6 0%, #f97316 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          margin-bottom: 24px;
          letter-spacing: -1px;
        }
        .initial-loader-spinner {
          width: 48px;
          height: 48px;
          border: 4px solid rgba(255, 255, 255, 0.1);
          border-left-color: #3b82f6;
          border-right-color: #f97316;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        .initial-loader-text {
          margin-top: 16px;
          font-size: 14px;
          color: #94a3b8;
          letter-spacing: 0.5px;
        }
      </style>
      <div class="initial-loader-wrapper">
        <div class="initial-loader-logo">Hyriq</div>
        <div class="initial-loader-spinner"></div>
        <div class="initial-loader-text">Loading your dashboard...</div>
      </div>
    </div>
    <noscript>
      <div style="font-family: sans-serif; text-align: center; padding: 40px; color: #fff; background: #0f172a; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h2>JavaScript Required</h2>
        <p>Please enable JavaScript or check if a network blocker is stopping scripts from loading to view this website.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
